<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BRIBAR | Iniciar Sesión</title>


    <style>

        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

            font-family: Arial, sans-serif;

        }


        body {

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 20px;

            background:

            radial-gradient(

                circle at top,

                #3b208b,

                #21115c,

                #0c0a32

            );

        }


        .login-container {

            width: 100%;

            max-width: 390px;

            padding: 35px 28px;

            background: white;

            border-radius: 18px;

            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);

            text-align: center;

        }


        .logo {

            width: 75px;

            height: 75px;

            margin: auto;

            display: flex;

            justify-content: center;

            align-items: center;

            border-radius: 50%;

            background: linear-gradient(

                135deg,

                #3b208b,

                #7d4bd6

            );

            color: white;

            font-size: 35px;

            box-shadow: 0 5px 15px #aaa;

        }


        h1 {

            margin-top: 18px;

            color: #19134d;

            font-size: 27px;

        }


        .descripcion {

            margin-top: 8px;

            margin-bottom: 25px;

            color: #777;

            font-size: 14px;

        }


        .campo {

            text-align: left;

            margin-top: 16px;

        }


        .campo label {

            display: block;

            color: #21115c;

            font-size: 14px;

            font-weight: bold;

            margin-bottom: 7px;

        }


        .campo input {

            width: 100%;

            padding: 14px;

            border: 1px solid #d8d8d8;

            border-radius: 8px;

            font-size: 14px;

            outline: none;

        }


        .campo input:focus {

            border-color: #5732bd;

            box-shadow: 0 0 5px #c6b5ff;

        }


        button {

            width: 100%;

            margin-top: 25px;

            padding: 14px;

            border: none;

            border-radius: 8px;

            background: linear-gradient(

                90deg,

                #3b208b,

                #6841c5

            );

            color: white;

            font-size: 16px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;

        }


        button:hover {

            transform: scale(1.02);

            background: #21115c;

        }


        .mensaje {

            margin-top: 15px;

            color: red;

            font-size: 13px;

        }


        /* PARA TELÉFONOS */

        @media (max-width: 500px) {


            .login-container {

                padding: 30px 20px;

            }


            h1 {

                font-size: 24px;

            }


        }

    </style>

</head>


<body>


    <div class="login-container">


        <div class="logo">

            🔒

        </div>


        <h1>

            Iniciar sesión

        </h1>


        <p class="descripcion">

            Ingresa tu usuario y contraseña

        </p>


        <div class="campo">


            <label>

                Usuario

            </label>


            <input

                type="text"

                id="usuario"

                placeholder="Escribe tu usuario"

            >

        </div>


        <div class="campo">


            <label>

                Contraseña

            </label>


            <input

                type="password"

                id="contraseña"

                placeholder="Escribe tu contraseña"

            >

        </div>


        <button onclick="iniciarSesion()">

            Iniciar sesión →

        </button>


        <p id="mensaje" class="mensaje"></p>


    </div>


    <script>


        function iniciarSesion() {


            let usuario =

            document.getElementById("usuario").value;


            let contraseña =

            document.getElementById("contraseña").value;


            let mensaje =

            document.getElementById("mensaje");


            if (usuario === "" || contraseña === "") {


                mensaje.textContent =

                "Por favor, completa todos los campos.";


                return;


            }


            // Ir a la tercera pantalla

            window.location.href = "inicio.html";


        }


    </script>


</body>

</html>
